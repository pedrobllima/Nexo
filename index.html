<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nexo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b0f;--s1:#111318;--s2:#181b24;--line:#1e2230;
  --tx:#e8e9f0;--mut:#5a6080;--ac:#7c6af5;--ok:#46c98b;--warn:#f5b545;--danger:#e05c8a;
}
body.light{
  --bg:#f4f5f9;--s1:#ffffff;--s2:#eef0f6;--line:#d8dae8;
  --tx:#1a1c2a;--mut:#7a7f9a;--ac:#6355e0;--ok:#2ea870;--warn:#d4900a;--danger:#c43a6a;
}
body{background:var(--bg);color:var(--tx);font-family:'Inter',system-ui,sans-serif;min-height:100vh;padding:0 0 80px;transition:background .25s,color .25s}

/* VIEWS */
.view{display:none}.view.on{display:block}

/* HEADER */
.hd{padding:28px 32px 0;max-width:1000px;margin:0 auto}
.hd-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.hd-date{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut)}
.hd-actions{display:flex;gap:14px;align-items:center}
.hd-btn{font-size:13px;color:var(--mut);cursor:pointer;opacity:.5;transition:.2s;background:none;border:0;font-family:inherit}
.hd-btn:hover{opacity:1;color:var(--tx)}
.focus-row{display:flex;align-items:center;gap:10px;margin-top:14px;background:var(--s1);border:1px solid var(--line);border-radius:14px;padding:14px 18px}
.focus-dot{width:10px;height:10px;border-radius:50%;background:var(--ac);flex:none;box-shadow:0 0 10px var(--ac)}
.focus-label{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap}
.focus-val{flex:1;font-size:16px;font-weight:500;color:var(--tx);background:transparent;border:0;outline:0;font-family:inherit;min-width:0}
.focus-val::placeholder{color:var(--mut);font-weight:300}
.focus-save{font-size:13px;color:var(--ac);cursor:pointer;opacity:.7;white-space:nowrap;background:none;border:0;font-family:inherit}
.focus-save:hover{opacity:1}

/* BADGE HIPERFOCO */
.hf-badge{display:inline-flex;align-items:center;gap:6px;background:#7c6af520;border:1px solid #7c6af540;border-radius:20px;padding:4px 14px;font-size:13px;color:var(--ac);margin-top:10px}

/* RODA */
.wheel-wrap{max-width:1000px;margin:22px auto 0;padding:0 32px}
.wheel-card{background:var(--s1);border:1px solid var(--line);border-radius:18px;padding:24px 28px}
.wheel-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin-bottom:18px;text-align:center}
.wheel-inner{display:flex;align-items:center;gap:32px}
#wheel{flex:none;display:block}
.wheel-legend{flex:1;display:flex;flex-direction:column;gap:12px}
.wleg{display:flex;align-items:center;gap:10px;cursor:pointer}
.wleg:hover .wleg-name{text-decoration:underline}
.wleg-dot{width:10px;height:10px;border-radius:50%;flex:none}
.wleg-name{font-size:14px;font-weight:500;flex:1}
.wleg-info{font-size:12px;color:var(--mut);white-space:nowrap;text-align:right}

/* SEÇÕES */
.section{max-width:1000px;margin:20px auto 0;padding:0 32px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut)}
.sec-action{font-size:13px;color:var(--ac);cursor:pointer;opacity:.7;background:none;border:0;font-family:inherit}
.sec-action:hover{opacity:1}

/* AGENDA */
.calframe{width:100%;height:480px;border:1px solid var(--line);border-radius:14px;background:#fff;display:block}
.calsetup{background:var(--s1);border:1px dashed var(--line);border-radius:14px;padding:20px}
.calsetup p{font-size:14px;color:var(--mut);line-height:1.6;margin-bottom:12px}
.calsetup ol{margin:0 0 14px 20px;font-size:14px;color:var(--mut);line-height:1.9}
.calsetup b{color:var(--tx)}
.inp{width:100%;background:#0e1116;border:1px solid var(--line);border-radius:9px;color:var(--tx);font:14px 'Inter',system-ui;padding:12px;outline:0}
.inp:focus{border-color:var(--ac)}
textarea.inp{resize:none}
.btn-pri{background:var(--ac);color:#fff;border:0;border-radius:10px;padding:13px 20px;font:600 14px 'Inter',system-ui;cursor:pointer;transition:.15s}
.btn-pri:hover{filter:brightness(1.12)}
.btn-sec{background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:10px;padding:12px 18px;font:600 14px 'Inter',system-ui;cursor:pointer}
.btn-sec:hover{color:var(--tx)}

/* CARDS */
.dims{max-width:1000px;margin:20px auto 0;padding:0 32px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.dim{background:var(--s1);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:.15s;position:relative}
.dim:hover{background:var(--s2)}
.dim.alert-on{border-color:var(--warn)}
.dim-bar{position:absolute;top:0;left:0;right:0;height:3px}
.dim-top{padding:18px 18px 12px}
.dim-name{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.1em;font-weight:600;margin-bottom:5px}
.dim-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.dim-days{font-size:12px;color:var(--mut)}
.dim-days.warn{color:var(--warn);font-weight:600}
.dim-count{font-size:11px;color:var(--mut);background:var(--s2);border-radius:20px;padding:2px 9px}
.dim-note{font-size:13px;color:var(--mut);line-height:1.5;min-height:36px;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.dim-btns{display:flex;gap:6px;padding:0 18px 14px}
.btn-dim{flex:none;background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:8px 11px;font:500 12px 'Inter',system-ui;cursor:pointer;transition:.15s}
.btn-dim.grow{flex:1}
.btn-dim:hover{border-color:var(--ac);color:var(--ac)}
.btn-dim.log:hover{border-color:var(--c4,#b07cf0);color:var(--c4,#b07cf0)}

/* INTENSIDADE */
.int-row{display:flex;gap:6px;margin-bottom:12px}
.int-btn{flex:1;background:transparent;border:1px solid var(--line);border-radius:9px;padding:9px 6px;font:500 13px 'Inter',system-ui;cursor:pointer;text-align:center;transition:.15s;color:var(--mut)}
.int-btn:hover,.int-btn.on{border-color:var(--ac);color:var(--tx);background:var(--ac)20}

/* LOG */
.dim-log{display:none;border-top:1px solid var(--line);padding:12px 18px 14px;max-height:220px;overflow-y:auto}
.dim-log.on{display:block}
.log-entry{padding:8px 0;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:10px}
.log-entry:last-child{border:0}
.log-ts{font-size:11px;color:var(--mut);white-space:nowrap;min-width:80px}
.log-int{font-size:13px;white-space:nowrap}
.log-note{font-size:13px;color:var(--tx);flex:1;line-height:1.5}
.log-del{font-size:13px;color:var(--mut);cursor:pointer;opacity:.4;flex:none}
.log-del:hover{opacity:1;color:var(--danger)}

/* GRÁFICO */
.chart-card{background:var(--s1);border:1px solid var(--line);border-radius:16px;padding:20px 22px}
.chart-sub{font-size:12px;color:var(--mut);margin-bottom:16px}
.chart-toggle{display:flex;gap:8px;margin-bottom:14px}
.ct-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--line);background:transparent;color:var(--mut);cursor:pointer}
.ct-btn.on{border-color:var(--ac);color:var(--ac);background:var(--ac)15}
#hist-svg{width:100%;display:block}
.mini-wheels{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.mini-week{flex:none;text-align:center}
.mini-lbl{font-size:10px;color:var(--mut);margin-top:5px}
.chart-legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:14px}
.cl-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mut)}
.cl-dot{width:9px;height:9px;border-radius:50%;flex:none}

/* OVERLAY / MODAL GENÉRICO */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--s1);border:1px solid var(--line);border-radius:22px 22px 0 0;padding:24px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Cinzel',serif;font-size:15px;letter-spacing:.1em;font-weight:600;margin-bottom:14px}
.modal-row{display:flex;gap:10px;margin-top:12px}
.modal-hint{font-size:13px;color:var(--mut);margin-bottom:10px}

/* QUICK ENTRY */
#quick-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:flex-start;justify-content:center;padding-top:100px}
#quick-overlay.on{display:flex}
.quick-box{background:var(--s1);border:1px solid var(--line);border-radius:18px;padding:20px;width:100%;max-width:560px;margin:0 20px}
.quick-hint{font-size:13px;color:var(--mut);margin-bottom:12px}
.quick-dims{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.qdim{border:1px solid var(--line);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;color:var(--mut);background:transparent;transition:.15s}
.qdim.on{font-weight:600}
.quick-row{display:flex;gap:10px;margin-top:10px}

/* CONFIG VIEW */
.config-wrap{max-width:1000px;margin:0 auto;padding:28px 32px}
.config-title{font-family:'Cinzel',serif;font-size:16px;letter-spacing:.1em;color:var(--tx);margin-bottom:20px}
.dim-cfg{background:var(--s1);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
.dim-cfg-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.dim-cfg-name{flex:1;font-size:15px;font-weight:600}
.dim-cfg-actions{display:flex;gap:8px}
.cfg-btn{font-size:12px;padding:5px 11px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--mut);cursor:pointer}
.cfg-btn:hover{color:var(--tx)}
.cfg-row{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.cfg-label{font-size:12px;color:var(--mut);width:100px;flex:none}
.cfg-val{flex:1;font-size:13px}
.color-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);cursor:pointer;flex:none}
.add-dim-btn{width:100%;background:transparent;border:1px dashed var(--line);border-radius:12px;padding:14px;font:500 14px 'Inter',system-ui;color:var(--mut);cursor:pointer;margin-top:4px}
.add-dim-btn:hover{color:var(--tx);border-color:var(--ac)}

/* EXPORT */
.export-out{background:#0a0f0a;border:1px solid var(--line);border-radius:10px;padding:14px;font:13px/1.8 monospace;color:#8db88d;white-space:pre-wrap;max-height:320px;overflow-y:auto;margin:12px 0}

/* TIMELINE */
.tl-entry{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.tl-entry:last-child{border:0}
.tl-dot{width:9px;height:9px;border-radius:50%;background:var(--ac);margin-top:5px;flex:none}
.tl-body{flex:1}
.tl-text{font-size:14px;font-weight:500;color:var(--tx)}
.tl-dates{font-size:12px;color:var(--mut);margin-top:3px}

/* TOAST */
#toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:#111e10;border:1px solid var(--ok);color:var(--ok);font:600 13px 'Inter',system-ui;padding:11px 22px;border-radius:22px;opacity:0;pointer-events:none;transition:.2s;z-index:300;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* SHORTCUT HINT */
.shortcut{position:fixed;bottom:18px;right:18px;background:var(--s1);border:1px solid var(--line);border-radius:9px;padding:6px 12px;font-size:12px;color:var(--mut);opacity:.6}

@media(max-width:700px){.dims{grid-template-columns:1fr 1fr}.wheel-inner{flex-direction:column}}
@media(max-width:440px){.dims{grid-template-columns:1fr}}
</style>
<script src="https://apis.google.com/js/api.js" onload="initGapi()"></script>
<script src="https://accounts.google.com/gsi/client"></script>
</head>
<body>

<!-- ═══ TELA DE LOGIN ═══ -->
<div id="login-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:24px;padding:20px">
  <div style="font-family:'Cinzel',serif;font-size:28px;letter-spacing:.1em;color:var(--tx)">Nexo</div>
  <div style="font-size:14px;color:var(--mut);text-align:center;max-width:320px;line-height:1.6">Seus dados ficam no seu Google Drive.<br>Nenhum servidor externo armazena suas informações.</div>
  <button onclick="signIn()" style="display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--line);border-radius:12px;padding:14px 24px;font:600 15px 'Inter',system-ui;color:var(--tx);cursor:pointer;transition:.15s">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Entrar com Google
  </button>
</div>

<!-- ═══ VIEW: MAIN ═══ -->
<div class="view" id="view-main">

  <div class="hd">
    <div class="hd-row">
      <span class="hd-date" id="hd-date"></span>
      <div class="hd-actions">
        <button class="hd-btn" onclick="openExport()">↓ exportar</button>
        <button class="hd-btn" onclick="openTimeline()">⟳ foco</button>
        <span id="sync-status" style="font-size:11px;color:var(--mut);opacity:0;transition:opacity .4s"></span>
        <button class="hd-btn" id="theme-btn" onclick="toggleTheme()">☀</button>
        <button class="hd-btn" onclick="showView('config')">⚙ dimensões</button>
        <button class="hd-btn" onclick="signOut()" title="Sair">⏏</button>
      </div>
    </div>
    <div class="focus-row">
      <div class="focus-dot"></div>
      <span class="focus-label">em foco</span>
      <input class="focus-val" id="focus-val" placeholder="Nenhum hiperfoco ativo" maxlength="80">
      <button class="focus-save" onclick="saveFocus()">salvar</button>
    </div>
    <div id="hf-badge-wrap"></div>
  </div>

  <div class="wheel-wrap">
    <div class="wheel-card">
      <div class="wheel-title">equilíbrio · agora</div>
      <div class="wheel-inner">
        <svg id="wheel" viewBox="0 0 220 220" width="220" height="220"></svg>
        <div class="wheel-legend" id="wheel-legend"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="sec-head">
      <span class="sec-title">agenda de hoje</span>
      <button class="sec-action" id="cal-edit-btn" onclick="editCal()" style="display:none">editar</button>
    </div>
    <div id="cal-wrap"></div>
  </div>

  <div class="dims" id="dims"></div>

  <div class="section" style="margin-top:20px">
    <div class="sec-head">
      <span class="sec-title">histórico · últimas 6 semanas</span>
    </div>
    <div class="chart-card">
      <div class="chart-toggle">
        <button class="ct-btn on" id="ct-bar" onclick="setChartMode('bar')">barras</button>
        <button class="ct-btn" id="ct-wheel" onclick="setChartMode('wheel')">rodas</button>
      </div>
      <div id="hist-wrap"></div>
      <div class="chart-legend" id="hist-legend"></div>
    </div>
  </div>

</div><!-- /view-main -->

<!-- ═══ VIEW: CONFIG ═══ -->
<div class="view" id="view-config">
  <div class="config-wrap">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <button class="btn-sec" onclick="showView('main')">← voltar</button>
      <div class="config-title" style="margin:0">Dimensões</div>
    </div>
    <div id="cfg-dims"></div>
    <button class="add-dim-btn" onclick="addDim()">+ nova dimensão</button>
  </div>
</div>

<!-- ═══ OVERLAY: NOTA + INTENSIDADE ═══ -->
<div class="overlay" id="note-overlay" onclick="bgClose(event,'note-overlay')">
  <div class="modal">
    <div class="modal-title" id="note-title"></div>
    <div class="modal-hint" id="note-hint"></div>
    <div class="int-row" id="int-row">
      <button class="int-btn" data-v="1" onclick="setInt(1)">💧 leve</button>
      <button class="int-btn" data-v="2" onclick="setInt(2)">⚡ médio</button>
      <button class="int-btn" data-v="3" onclick="setInt(3)">🔥 intenso</button>
    </div>
    <textarea class="inp" id="note-text" rows="3" style="margin-bottom:0" placeholder="O que aconteceu? (opcional)"></textarea>
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px;margin-bottom:0">
      <button class="btn-sec" id="voice-btn" onclick="toggleVoice()" style="flex:none;padding:10px 12px" title="Ditado por voz">🎙</button>
      <span style="font-size:11px;color:var(--mut)" id="voice-status"></span>
    </div>
    <div class="modal-row">
      <button class="btn-sec" onclick="closeNote()">cancelar</button>
      <button class="btn-pri" style="flex:1" onclick="saveNote()">registrar</button>
    </div>
  </div>
</div>

<!-- ═══ OVERLAY: QUICK ENTRY ═══ -->
<div id="quick-overlay" onclick="quickBgClose(event)">
  <div class="quick-box">
    <div class="quick-hint">/ entrada rápida — selecione a dimensão</div>
    <div class="quick-dims" id="quick-dims"></div>
    <textarea class="inp" id="quick-text" rows="2" placeholder="Nota (opcional)"></textarea>
    <div class="int-row" id="quick-int" style="margin-top:8px">
      <button class="int-btn" data-v="1" onclick="setQuickInt(1)">💧 leve</button>
      <button class="int-btn" data-v="2" onclick="setQuickInt(2)">⚡ médio</button>
      <button class="int-btn" data-v="3" onclick="setQuickInt(3)">🔥 intenso</button>
    </div>
    <div class="quick-row">
      <button class="btn-sec" onclick="closeQuick()">cancelar</button>
      <button class="btn-pri" style="flex:1" onclick="saveQuick()">registrar</button>
    </div>
  </div>
</div>

<!-- ═══ OVERLAY: DRILL-DOWN GRÁFICO ═══ -->
<div class="overlay" id="drill-overlay" onclick="bgClose(event,'drill-overlay')">
  <div class="modal">
    <div class="modal-title" id="drill-title"></div>
    <div id="drill-body" style="max-height:350px;overflow-y:auto"></div>
    <div class="modal-row" style="margin-top:12px">
      <button class="btn-sec" style="width:100%" onclick="closeDrill()">fechar</button>
    </div>
  </div>
</div>

<!-- ═══ OVERLAY: TIMELINE DO FOCO ═══ -->
<div class="overlay" id="tl-overlay" onclick="bgClose(event,'tl-overlay')">
  <div class="modal">
    <div class="modal-title">Linha do tempo · Em foco</div>
    <div id="tl-body" style="max-height:350px;overflow-y:auto"></div>
    <div class="modal-row" style="margin-top:12px">
      <button class="btn-sec" style="width:100%" onclick="closeOverlay('tl-overlay')">fechar</button>
    </div>
  </div>
</div>

<!-- ═══ OVERLAY: EXPORTAR MARKDOWN ═══ -->
<div class="overlay" id="export-overlay" onclick="bgClose(event,'export-overlay')">
  <div class="modal">
    <div class="modal-title">Exportar · Markdown</div>
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <button class="ct-btn on" id="exp-w" onclick="setExportPeriod('week')">semana</button>
      <button class="ct-btn" id="exp-m" onclick="setExportPeriod('month')">mês</button>
      <button class="ct-btn" id="exp-a" onclick="setExportPeriod('all')">tudo</button>
    </div>
    <div class="export-out" id="export-out"></div>
    <div class="modal-row">
      <button class="btn-sec" onclick="closeOverlay('export-overlay')">fechar</button>
      <button class="btn-pri" style="flex:1" onclick="copyExport()">copiar</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<div class="shortcut">pressione <b>/</b> para registrar</div>

<script>
/* ══════════════════════════════════════════
   CONSTANTES
══════════════════════════════════════════ */
var KEY = 'nexo_v3';

/* ── DRIVE: encontrar ou criar o arquivo de dados ── */
function findOrCreateFile(callback) {
  gapi.client.drive.files.list({
    spaces: 'appDataFolder',
    q: 'name="'+FILE_NAME+'"',
    fields: 'files(id,name)'
  }).then(function(resp) {
    var files = resp.result.files;
    if (files && files.length > 0) {
      driveFileId = files[0].id;
      callback(false); // arquivo existente
    } else {
      // criar arquivo vazio
      gapi.client.request({
        path: 'https://www.googleapis.com/upload/drive/v3/files',
        method: 'POST',
        params: {uploadType: 'multipart'},
        headers: {'Content-Type': 'multipart/related; boundary=boundary123'},
        body: '--boundary123\r\nContent-Type: application/json\r\n\r\n'
          + JSON.stringify({name: FILE_NAME, parents: ['appDataFolder']})
          + '\r\n--boundary123\r\nContent-Type: application/json\r\n\r\n{}\r\n--boundary123--'
      }).then(function(resp) {
        driveFileId = resp.result.id;
        callback(true); // arquivo novo
      });
    }
  });
}

/* ── DRIVE: carregar dados ── */
function loadFromDrive() {
  showSyncStatus('⟳ carregando...');
  findOrCreateFile(function(isNew) {
    if (isNew) { load(); render(); hideSyncStatus(); return; }
    gapi.client.drive.files.get({
      fileId: driveFileId,
      alt: 'media'
    }).then(function(resp) {
      try {
        var data = typeof resp.result === 'string' ? JSON.parse(resp.result) : resp.result;
        if (data && typeof data === 'object' && Object.keys(data).length > 0) {
          state = data;
        }
      } catch(e) {}
      load(); // normalizar/migrar
      render();
      hideSyncStatus();
    }).catch(function() { load(); render(); hideSyncStatus(); });
  });
}

/* ── DRIVE: salvar dados (debounced 2s) ── */
function save() {
  // sempre salva local imediatamente (fallback)
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
  // sincroniza com Drive após 2s de inatividade
  clearTimeout(syncTimer);
  syncTimer = setTimeout(saveToDrive, 2000);
}

function saveToDrive() {
  if (!driveFileId || !gapiReady) return;
  showSyncStatus('⟳ salvando...');
  var boundary = 'nexoboundary';
  var body = '--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'
    + JSON.stringify(state)
    + '\r\n--'+boundary+'--';
  gapi.client.request({
    path: 'https://www.googleapis.com/upload/drive/v3/files/'+driveFileId,
    method: 'PATCH',
    params: {uploadType: 'multipart'},
    headers: {'Content-Type': 'multipart/related; boundary='+boundary},
    body: body
  }).then(function() {
    hideSyncStatus(); toast('Sincronizado ✓');
  }).catch(function() {
    hideSyncStatus(); toast('Erro ao sincronizar — salvo local');
  });
}

function showSyncStatus(msg) {

function hideSyncStatus() {

/* ══════════════════════════════════════════
   LOAD LOCAL (normalização/migração)
══════════════════════════════════════════ */
function load() {
  // se state vazio, tenta localStorage como fallback
  if (!state || !Object.keys(state).length) {
    try { var s = localStorage.getItem(KEY); if (s) state = JSON.parse(s); } catch(e) {}
  }
  if (!state || typeof state !== 'object') state = {};
  if (!Array.isArray(state.dimOrder) || !state.dimOrder.length) {
    state.dimOrder = DEFAULT_DIMS.map(function(d){return d.n;});
  }
  if (!state.dims) state.dims = {};
  DEFAULT_DIMS.forEach(function(d){
    if (!state.dims[d.n]) state.dims[d.n] = {};
    var dm = state.dims[d.n];
    if (!dm.color) dm.color = d.color;
    if (!Array.isArray(dm.entries)) {
      dm.entries = dm.last ? [{ts:dm.last+'T12:00:00.000Z', note:dm.note||'', intensity:0}] : [];
      delete dm.last; delete dm.note;
    }
    dm.entries.forEach(function(e){ if (e.intensity === undefined) e.intensity = 0; });
    if (!dm.template) dm.template = '';
    if (dm.alertDays === undefined) dm.alertDays = null;
    if (dm.archived === undefined) dm.archived = false;
  });
  if (!state.focus) state.focus = '';
  if (!Array.isArray(state.focusHistory)) state.focusHistory = [];
  if (!state.calUrl) state.calUrl = '';
}

/* ══════════════════════════════════════════
   TEMPO
══════════════════════════════════════════ */
function todayISO() { return new Date().toISOString().slice(0,10); }
function nowISO()   { return new Date().toISOString(); }
function dayName()  { return new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'}); }
function daysSince(iso) {
  if (!iso) return null;
  return Math.floor((Date.now() - new Date(iso)) / 86400000);
}
function daysLabel(n) {
  if (n === null) return 'nunca';
  if (n === 0)    return 'hoje';
  if (n === 1)    return 'ontem';
  return 'há '+n+'d';
}
function fmtDT(iso) {
  var d = new Date(iso);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})
    +' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
function weekKey(iso) {
  var d = new Date(iso), day = d.getDay();
  var mon = new Date(d); mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return mon.toISOString().slice(0,10);
}
function weeksBack(n) {
  var d = new Date(); d.setDate(d.getDate() - n*7);
  return weekKey(d.toISOString().slice(0,10));
}
function weekLabel(wk) { var d = new Date(wk); return (d.getDate())+'/'+(d.getMonth()+1); }

/* ══════════════════════════════════════════
   DERIVADOS
══════════════════════════════════════════ */
function activeDims() {
  return state.dimOrder.filter(function(n){
    return state.dims[n] && !state.dims[n].archived;
  });
}
function lastDate(dn) {
  var e = state.dims[dn].entries;
  return e.length ? e[e.length-1].ts.slice(0,10) : null;
}
function dimScore(dn) {
  var minR = 11, maxR = 90;
  var dm = state.dims[dn];
  if (!dm || !dm.entries.length) return minR;
  var ds = daysSince(lastDate(dn));
  if (ds === null) return minR;
  // intensidade máxima dos últimos 7 dias
  var cutoff = Date.now() - 7*86400000;
  var recent = dm.entries.filter(function(e){ return new Date(e.ts) >= cutoff; });
  var maxInt = recent.reduce(function(m,e){ return Math.max(m, e.intensity||0); }, 0);
  var decay = INT_DECAY[maxInt];
  if (ds === 0) return maxR;
  if (ds >= decay) return minR;
  return minR + (maxR - minR) * ((decay - ds) / decay);
}
function detectHiperfoco() {
  // se ≥60% dos registros dos últimos 7 dias são de uma dimensão
  var cutoff = Date.now() - 7*86400000;
  var counts = {};
  var total = 0;
  activeDims().forEach(function(n){
    var c = state.dims[n].entries.filter(function(e){ return new Date(e.ts) >= cutoff; }).length;
    counts[n] = c; total += c;
  });
  if (total < 3) return null;
  var winner = null, max = 0;
  Object.keys(counts).forEach(function(n){ if (counts[n] > max) { max = counts[n]; winner = n; }});
  if (winner && counts[winner]/total >= 0.6) return winner;
  return null;
}

/* ── RODA ── */
function renderWheel() {
  var svg = document.getElementById('wheel');
  var cx = 110, cy = 110, maxR = 90;
  svg.innerHTML = '';
  var mk = function(tag, a) {
    var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    Object.keys(a).forEach(function(k){ el.setAttribute(k, a[k]); });
    return el;
  };
  svg.appendChild(mk('circle',{cx:cx,cy:cy,r:maxR,fill:'none',stroke:'#1e2230','stroke-width':'1'}));
  [.25,.5,.75].forEach(function(f){
    svg.appendChild(mk('circle',{cx:cx,cy:cy,r:maxR*f,fill:'none',stroke:'#1e2230','stroke-width':'.4','stroke-dasharray':'2 4'}));
  });
  var dims = activeDims();
  var scores = dims.map(function(n){ return dimScore(n); });
  var pts = dims.map(function(n,i){
    var ang = (Math.PI*2*i/dims.length) - Math.PI/2;
    return [cx + scores[i]*Math.cos(ang), cy + scores[i]*Math.sin(ang)];
  });
  if (pts.length) {
    svg.appendChild(mk('polygon',{
      points: pts.map(function(p){ return p[0]+','+p[1]; }).join(' '),
      fill:'rgba(124,106,245,.12)', stroke:'rgba(124,106,245,.45)',
      'stroke-width':'1.5', 'stroke-linejoin':'round'
    }));
  }
  dims.forEach(function(n,i){
    var ang = (Math.PI*2*i/dims.length) - Math.PI/2;
    svg.appendChild(mk('line',{x1:cx,y1:cy,x2:cx+maxR*Math.cos(ang),y2:cy+maxR*Math.sin(ang),stroke:'#1e2230','stroke-width':'1'}));
    var c = state.dims[n].color||'#888';
    svg.appendChild(mk('circle',{cx:pts[i][0],cy:pts[i][1],r:3.5,fill:c}));
  });
  var leg = document.getElementById('wheel-legend'); leg.innerHTML = '';
  dims.forEach(function(n,i){
    var ds = daysSince(lastDate(n));
    var dm = state.dims[n];
    var alerted = dm.alertDays && ds !== null && ds >= dm.alertDays;
    var el = document.createElement('div'); el.className = 'wleg';
    el.innerHTML = '<div class="wleg-dot" style="background:'+(dm.color||'#888')+'"></div>'
      +'<span class="wleg-name" style="color:'+(dm.color||'#888')+'">'+n+'</span>'
      +'<span class="wleg-info'+(alerted?' warn':'')+'">'+daysLabel(ds)+'</span>';
    el.onclick = function(){ scrollToDim(i); };
    leg.appendChild(el);
  });
}

function renderDims() {

function toggleLog(n, i) {
  var el = document.getElementById('dlog-'+i);
  if (el.classList.contains('on')) { el.classList.remove('on'); return; }
  var entries = state.dims[n].entries;
  if (!entries.length) { el.innerHTML='<div style="padding:8px;font-size:12px;color:var(--mut)">Nenhum registro ainda.</div>'; el.classList.add('on'); return; }
  var h = '';
  entries.slice().reverse().forEach(function(e, idx){
    var realIdx = entries.length - 1 - idx;
    h += '<div class="log-entry">'
      +'<span class="log-ts">'+fmtDT(e.ts)+'</span>'
      +(e.intensity ? '<span class="log-int">'+INT_LABEL[e.intensity]+'</span>' : '')
      +'<span class="log-note">'+(e.note ? esc(e.note) : '<em style="opacity:.35">sem nota</em>')+'</span>'
      +'<span class="log-del" onclick="delEntry(\''+n+'\','+realIdx+','+i+')">✕</span>'
    +'</div>';
  });
  el.innerHTML = h; el.classList.add('on');
}
function delEntry(n, idx, i) {
  state.dims[n].entries.splice(idx, 1);
  save(); renderWheel(); renderDims(); renderChart();

}

/* ── VOZ ── */
function toggleVoice() {
  if (voiceOn) { stopVoice(); return; }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Seu browser não suporta ditado por voz'); return; }
  voiceRec = new SR();
  voiceRec.lang = 'pt-BR'; voiceRec.continuous = false; voiceRec.interimResults = true;
  voiceRec.onresult = function(e) {
    var t = Array.from(e.results).map(function(r){ return r[0].transcript; }).join('');
    document.getElementById('note-text').value = t;
  };
  voiceRec.onerror = function(){ stopVoice(); };
  voiceRec.onend = function(){ stopVoice(); };
  voiceRec.start(); voiceOn = true;
  document.getElementById('voice-btn').textContent = '⏹';
  document.getElementById('voice-status').textContent = 'ouvindo...';
}
function stopVoice() {
  if (voiceRec) { try { voiceRec.stop(); } catch(e){} voiceRec = null; }
  voiceOn = false;
  var vb = document.getElementById('voice-btn');
  if (vb) { vb.textContent = '🎙'; }
  var vs = document.getElementById('voice-status');
  if (vs) vs.textContent = '';
}

function setChartMode(m) {

function weekScore(n, wk) {
  var entries = state.dims[n].entries.filter(function(e){ return weekKey(e.ts) === wk; });
  if (!entries.length) return 0;
  var maxInt = entries.reduce(function(m,e){ return Math.max(m, e.intensity||0); }, 0);
  return entries.length >= 2 ? 1 : (maxInt===3?0.85 : maxInt===2?0.65 : maxInt===1?0.5 : 0.4);
}
function renderChart() {
  var wrap = document.getElementById('hist-wrap');
  var weeks = []; for (var w=5; w>=0; w--) weeks.push(weeksBack(w));
  var dims = activeDims();
  if (chartMode === 'wheel') { renderMiniWheels(weeks, dims, wrap); }
  else { renderBars(weeks, dims, wrap); }
  // legenda
  var leg = document.getElementById('hist-legend'); leg.innerHTML = '';
  dims.forEach(function(n){
    var el = document.createElement('div'); el.className = 'cl-item';
    el.innerHTML = '<div class="cl-dot" style="background:'+(state.dims[n].color||'#888')+'"></div>'+n+' ('+state.dims[n].entries.length+')';
    leg.appendChild(el);
  });
}
function renderBars(weeks, dims, wrap) {
  var W = (wrap.parentElement ? wrap.parentElement.offsetWidth||320 : 320) - 36;
  var H = 120, padL=6, padR=6, padT=8, padB=22;
  var chartH = H-padT-padB, chartW = W-padL-padR;
  var data = weeks.map(function(wk){
    var obj = {wk:wk,total:0};
    dims.forEach(function(n){ var c=state.dims[n].entries.filter(function(e){return weekKey(e.ts)===wk;}).length; obj[n]=c; obj.total+=c; });
    return obj;
  });
  var maxT = Math.max(1, Math.max.apply(null, data.map(function(d){ return d.total; })));
  var mk = function(tag,a,txt){ var el=document.createElementNS('http://www.w3.org/2000/svg',tag); Object.keys(a).forEach(function(k){el.setAttribute(k,a[k]);}); if(txt!==undefined)el.textContent=txt; return el; };
  var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 '+W+' '+H); svg.setAttribute('width','100%'); svg.setAttribute('height',H);
  var bw = Math.floor(chartW/weeks.length), gap=4;
  weeks.forEach(function(wk,i){
    var x=padL+i*bw+gap/2, barW=bw-gap, yBase=padT+chartH, cumH=0;
    dims.forEach(function(n){
      var cnt=data[i][n]; if(!cnt)return;
      var h=Math.max(3,Math.round((cnt/maxT)*chartH));
      var y=yBase-cumH-h;
      var r=mk('rect',{x:x,y:y,width:barW,height:h,fill:state.dims[n].color||'#888',rx:'2'});
      (function(wkk){ r.style.cursor='pointer'; r.onclick=function(){ openDrill(wkk); }; })(wk);
      svg.appendChild(r); cumH+=h;
    });
    svg.appendChild(mk('text',{x:x+barW/2,y:H-4,'text-anchor':'middle','font-size':'9','fill':'#5a6080'},weekLabel(wk)));
  });
  wrap.innerHTML=''; wrap.appendChild(svg);
}
function renderMiniWheels(weeks, dims, wrap) {
  wrap.innerHTML='<div class="mini-wheels" id="mw-row"></div>';
  var row = document.getElementById('mw-row');
  var SZ = 80, cx=40, cy=40, maxR=34, minR=4;
  var mk = function(tag,a){ var el=document.createElementNS('http://www.w3.org/2000/svg',tag); Object.keys(a).forEach(function(k){el.setAttribute(k,a[k]);}); return el; };
  weeks.forEach(function(wk){
    var div=document.createElement('div'); div.className='mini-week';
    div.style.cursor='pointer'; div.onclick=function(){ openDrill(wk); };
    var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 '+SZ+' '+SZ); svg.setAttribute('width',SZ); svg.setAttribute('height',SZ);
    svg.appendChild(mk('circle',{cx:cx,cy:cy,r:maxR,fill:'none',stroke:'#1e2230','stroke-width':'1'}));
    var scores=dims.map(function(n){ return minR+(maxR-minR)*weekScore(n,wk); });
    var pts=dims.map(function(n,i){
      var ang=(Math.PI*2*i/dims.length)-Math.PI/2;
      return [cx+scores[i]*Math.cos(ang), cy+scores[i]*Math.sin(ang)];
    });
    if(pts.length>2) svg.appendChild(mk('polygon',{points:pts.map(function(p){return p[0]+','+p[1];}).join(' '),fill:'rgba(124,106,245,.15)',stroke:'rgba(124,106,245,.4)','stroke-width':'1','stroke-linejoin':'round'}));
    dims.forEach(function(n,i){
      var ang=(Math.PI*2*i/dims.length)-Math.PI/2;
      svg.appendChild(mk('circle',{cx:pts[i][0],cy:pts[i][1],r:2.5,fill:state.dims[n].color||'#888'}));
    });
    var lbl=document.createElement('div'); lbl.className='mini-lbl'; lbl.textContent=weekLabel(wk);
    div.appendChild(svg); div.appendChild(lbl); row.appendChild(div);
  });
}

/* ── DRILL-DOWN ── */
function openDrill(wk) {
  document.getElementById('drill-title').textContent = 'Semana de '+weekLabel(wk);
  var h = '';
  activeDims().forEach(function(n){
    var dm = state.dims[n];
    var entries = dm.entries.filter(function(e){ return weekKey(e.ts)===wk; });
    if (!entries.length) return;
    h += '<div style="margin-bottom:12px">'
      +'<div style="font-size:11px;font-weight:700;color:'+(dm.color||'#888')+';margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em">'+n+' ('+entries.length+')</div>';
    entries.forEach(function(e){
      h += '<div class="log-entry">'
        +'<span class="log-ts">'+fmtDT(e.ts)+'</span>'
        +(e.intensity?'<span class="log-int">'+INT_LABEL[e.intensity]+'</span>':'')
        +'<span class="log-note">'+(e.note?esc(e.note):'<em style="opacity:.35">sem nota</em>')+'</span>'
      +'</div>';
    });
    h += '</div>';
  });
  if (!h) h = '<div style="color:var(--mut);font-size:13px">Nenhum registro nessa semana.</div>';
  document.getElementById('drill-body').innerHTML = h;
  document.getElementById('drill-overlay').classList.add('on');
}
function closeDrill() { closeOverlay('drill-overlay'); }

/* ── FOCO + TIMELINE ── */
document.getElementById('focus-val').addEventListener('keydown', function(e){ if(e.key==='Enter') saveFocus(); });
function saveFocus() {
  var v = document.getElementById('focus-val').value.trim();
  var prev = state.focus;
  if (v === prev) { toast('Foco salvo'); return; }
  // fechar período anterior
  if (prev && state.focusHistory.length) {
    state.focusHistory[state.focusHistory.length-1].to = todayISO();
  }
  state.focus = v;
  if (v) state.focusHistory.push({text:v, from:todayISO(), to:null});
  save(); renderHFBadge(); toast('Foco atualizado');
}
function openTimeline() {
  var h = '';
  var all = state.focusHistory.slice().reverse();
  if (!all.length) h = '<div style="color:var(--mut);font-size:13px">Nenhuma mudança de foco registrada ainda.</div>';
  all.forEach(function(f){
    h += '<div class="tl-entry">'
      +'<div class="tl-dot"></div>'
      +'<div class="tl-body">'
        +'<div class="tl-text">'+esc(f.text)+'</div>'
        +'<div class="tl-dates">'+f.from + (f.to ? ' → '+f.to : ' → hoje') + '</div>'
      +'</div>'
    +'</div>';
  });
  document.getElementById('tl-body').innerHTML = h;
  document.getElementById('tl-overlay').classList.add('on');
}

/* ── EXPORTAR MARKDOWN ── */
function setExportPeriod(p) {
  exportPeriod = p;
  ['w','m','a'].forEach(function(x,i){
    document.getElementById('exp-'+x).classList.toggle('on', ['week','month','all'][i]===p);
  });
  renderExport();
}
function openExport() {
  renderExport();
  document.getElementById('export-overlay').classList.add('on');
}
function renderExport() {
  var cutoff = null;
  if (exportPeriod==='week')  cutoff = Date.now() - 7*86400000;
  if (exportPeriod==='month') cutoff = Date.now() - 30*86400000;
  var md = '# Nexo · Diário de Bordo\n';
  md += '_Exportado em '+new Date().toLocaleDateString('pt-BR')+'_\n\n';
  if (state.focus) md += '**Em foco:** '+state.focus+'\n\n';
  activeDims().forEach(function(n){
    var dm = state.dims[n];
    var entries = dm.entries.filter(function(e){ return !cutoff || new Date(e.ts)>=cutoff; });
    if (!entries.length) return;
    md += '## '+n+'\n';
    entries.slice().reverse().forEach(function(e){
      var line = '- **'+fmtDT(e.ts)+'**';
      if (e.intensity) line += ' '+INT_LABEL[e.intensity];
      if (e.note) line += ' — '+e.note;
      md += line+'\n';
    });
    md += '\n';
  });
  document.getElementById('export-out').textContent = md;
}
function copyExport() {
  var txt = document.getElementById('export-out').textContent;
  if (navigator.clipboard) { navigator.clipboard.writeText(txt).then(function(){ toast('Copiado ✓'); }); }
  else { try{var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Copiado ✓');}catch(e){} }
}

/* ── CONFIG DIMENSÕES ── */
function renderConfig() {
  load();
  var box = document.getElementById('cfg-dims'); box.innerHTML = '';
  state.dimOrder.forEach(function(n, i){
    var dm = state.dims[n]; if (!dm) return;
    var div = document.createElement('div'); div.className = 'dim-cfg';
    div.innerHTML =
      '<div class="dim-cfg-head">'
        +'<div class="color-dot" style="background:'+(dm.color||'#888')+'" onclick="cycleDimColor(\''+n+'\')" title="trocar cor"></div>'
        +'<div class="dim-cfg-name" style="color:'+(dm.color||'#888')+'">'+n+'</div>'
        +'<div class="dim-cfg-actions">'
          +(i>0?'<button class="cfg-btn" onclick="moveDim(\''+n+'\',-1)">↑</button>':'')
          +(i<state.dimOrder.length-1?'<button class="cfg-btn" onclick="moveDim(\''+n+'\',1)">↓</button>':'')
          +'<button class="cfg-btn" onclick="archiveDim(\''+n+'\')">'+(dm.archived?'↩ restaurar':'arquivar')+'</button>'
        +'</div>'
      +'</div>'
      +'<div class="cfg-row">'
        +'<span class="cfg-label">Template</span>'
        +'<input class="inp cfg-val" value="'+esc(dm.template||'')+'" placeholder="Prompt da nota (opcional)" onchange="saveCfgField(\''+n+'\',\'template\',this.value)">'
      +'</div>'
      +'<div class="cfg-row">'
        +'<span class="cfg-label">Alertar após</span>'
        +'<input class="inp cfg-val" type="number" min="1" max="90" value="'+(dm.alertDays||'')+'" placeholder="dias sem registro" style="width:80px" onchange="saveCfgField(\''+n+'\',\'alertDays\',this.value?parseInt(this.value):null)">'
        +'<span style="font-size:11px;color:var(--mut);margin-left:4px">dias</span>'
      +'</div>';
    box.appendChild(div);
  });
}
function saveCfgField(n, field, val) {
  state.dims[n][field] = val; save();
}
function cycleDimColor(n) {
  var idx = PALETTE.indexOf(state.dims[n].color||'');
  state.dims[n].color = PALETTE[(idx+1) % PALETTE.length];
  save(); renderConfig();
}
function moveDim(n, dir) {
  var i = state.dimOrder.indexOf(n);
  if (i+dir < 0 || i+dir >= state.dimOrder.length) return;
  state.dimOrder.splice(i,1); state.dimOrder.splice(i+dir,0,n);
  save(); renderConfig();
}
function archiveDim(n) {
  state.dims[n].archived = !state.dims[n].archived;
  save(); renderConfig();
}
function addDim() {
  var name = prompt('Nome da nova dimensão:','');
  if (!name || !name.trim()) return;
  name = name.trim();
  if (state.dims[name]) { toast('Já existe uma dimensão com esse nome'); return; }
  var usedColors = state.dimOrder.map(function(n){ return state.dims[n]&&state.dims[n].color; });
  var color = PALETTE.find(function(c){ return usedColors.indexOf(c)<0; }) || PALETTE[0];
  state.dims[name] = {color:color, entries:[], template:'', alertDays:null, archived:false};
  state.dimOrder.push(name);
  save(); renderConfig();
}

/* ── UTILITÁRIOS ── */
function scrollToDim(i) { var el=document.getElementById('dim-'+i); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); }
function closeOverlay(id) { document.getElementById(id).classList.remove('on'); }
function bgClose(e, id) { if (e.target === document.getElementById(id)) closeOverlay(id); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) {
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(window._tt); window._tt=setTimeout(function(){ t.classList.remove('on'); },1700);
}

/* ── TECLADO ── */
document.addEventListener('keydown', function(e){
  if (e.key==='/' && e.target.tagName!=='INPUT' && e.target.tagName!=='TEXTAREA') {
    e.preventDefault(); openQuick();
  }
  if (e.key==='Escape') {
    ['note-overlay','quick-overlay','drill-overlay','tl-overlay','export-overlay'].forEach(closeOverlay);
    closeQuick();
  }
});

/* ── TEMA ── */
function toggleTheme() {
  var light = document.body.classList.toggle('light');
  localStorage.setItem('nexo_theme', light ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = light ? '🌙' : '☀';
}
function applyTheme() {
  var t = localStorage.getItem('nexo_theme');
  if (t === 'light') { document.body.classList.add('light'); document.getElementById('theme-btn').textContent = '🌙'; }
}

// render acontece após login (loadFromDrive → render)
applyTheme();
window.addEventListener('resize', renderChart);
</script>
